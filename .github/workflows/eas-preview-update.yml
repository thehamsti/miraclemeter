name: EAS Preview Update

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: eas-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish PR preview update
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: preview
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
      UPDATE_MESSAGE: PR #${{ github.event.pull_request.number }} ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Add the EXPO_TOKEN repository secret before publishing EAS updates."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish preview update
        run: |
          eas update \
            --branch "$PREVIEW_BRANCH" \
            --platform ios \
            --environment preview \
            --non-interactive \
            --message "$UPDATE_MESSAGE"
