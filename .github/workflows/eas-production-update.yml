name: EAS Production Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: EAS update message
        required: true
        type: string
        default: Production OTA update
      rollout_percentage:
        description: Percentage of users to receive the update immediately
        required: true
        type: string
        default: "100"

concurrency:
  group: eas-production-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish production OTA update
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      UPDATE_MESSAGE: ${{ inputs.message }}
      ROLLOUT_PERCENTAGE: ${{ inputs.rollout_percentage }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Add the EXPO_TOKEN repository secret before publishing EAS updates."
            exit 1
          fi

      - name: Validate rollout percentage
        run: |
          if ! [[ "$ROLLOUT_PERCENTAGE" =~ ^([1-9][0-9]?|100)$ ]]; then
            echo "::error::rollout_percentage must be an integer from 1 to 100."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish update
        run: |
          eas update \
            --branch production \
            --platform ios \
            --environment production \
            --rollout-percentage "$ROLLOUT_PERCENTAGE" \
            --non-interactive \
            --message "$UPDATE_MESSAGE"
